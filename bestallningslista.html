<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<title>Beställningslista</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --surface2: #22223a;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f8;
    --muted: #8888aa;
    --accent: #7c6fff;
    --accent-soft: rgba(124,111,255,0.15);
    --accent-border: rgba(124,111,255,0.4);
    --green: #4ade80;
    --green-soft: rgba(74,222,128,0.12);
    --red: #f87171;
    --red-soft: rgba(248,113,113,0.12);
    --amber: #fbbf24;
    --amber-soft: rgba(251,191,36,0.12);
    --radius: 14px;
    --radius-sm: 8px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    padding-bottom: env(safe-area-inset-bottom);
  }

  .app {
    flex: 1;
    max-width: 480px;
    margin: 0 auto;
    width: 100%;
    padding: 0 0 6rem;
  }

  /* Header */
  .header {
    padding: 3rem 1.25rem 1.5rem;
    background: linear-gradient(180deg, rgba(124,111,255,0.08) 0%, transparent 100%);
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.25rem;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .logo-name {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .date-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    padding: 4px 10px;
    border-radius: 99px;
    border: 0.5px solid var(--border2);
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-top: 6px;
  }

  /* Stats row */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 0 1.25rem 1.25rem;
  }

  .stat {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.75rem;
    text-align: center;
  }

  .stat-num {
    font-size: 22px;
    font-weight: 600;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .stat-num.accent { color: var(--accent); }
  .stat-num.green { color: var(--green); }
  .stat-num.amber { color: var(--amber); }

  /* Input area */
  .input-area {
    padding: 0 1.25rem 1rem;
  }

  .input-box {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 1rem;
  }

  .input-box label {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: block;
    margin-bottom: 10px;
  }

  .input-row {
    display: flex;
    gap: 8px;
  }

  input[type="text"] {
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,111,255,0.15);
  }

  input[type="text"]::placeholder { color: var(--muted); }

  #itemName { flex: 2; }
  #itemQty { flex: 1; min-width: 0; }

  .add-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    padding: 10px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .add-btn:active { opacity: 0.8; transform: scale(0.97); }

  /* Section */
  .section-label {
    padding: 0 1.25rem 0.5rem;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .clear-link {
    color: var(--red);
    font-size: 11px;
    cursor: pointer;
    text-decoration: none;
    font-family: 'DM Mono', monospace;
    opacity: 0.7;
  }

  .clear-link:hover { opacity: 1; }

  /* List */
  .list {
    padding: 0 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .empty {
    text-align: center;
    padding: 3rem 1.25rem;
    color: var(--muted);
    font-size: 14px;
  }

  .empty-icon { font-size: 36px; margin-bottom: 10px; opacity: 0.4; }

  .item {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 0.875rem 1rem;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color 0.2s, background 0.2s;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .item.done {
    background: var(--green-soft);
    border-color: rgba(74,222,128,0.2);
  }

  .check-circle {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 1.5px solid var(--border2);
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    color: transparent;
    font-size: 13px;
  }

  .check-circle:active { transform: scale(0.9); }

  .item.done .check-circle {
    background: var(--green);
    border-color: var(--green);
    color: #0f0f1a;
  }

  .item-body { flex: 1; min-width: 0; }

  .item-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color 0.2s;
  }

  .item.done .item-name {
    color: var(--muted);
    text-decoration: line-through;
  }

  .item-qty {
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--accent);
    margin-top: 2px;
  }

  .item.done .item-qty { color: var(--muted); }

  .del-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 18px;
    padding: 4px;
    line-height: 1;
    transition: color 0.15s;
    flex-shrink: 0;
  }

  .del-btn:hover { color: var(--red); }

  /* Bottom bar */
  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    background: rgba(15,15,26,0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 0.5px solid var(--border2);
    padding: 0.875rem 1.25rem;
    padding-bottom: calc(0.875rem + env(safe-area-inset-bottom));
    display: flex;
    gap: 10px;
    max-width: 480px;
    margin: 0 auto;
  }

  .btn-secondary {
    flex: 1;
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-secondary:active { background: var(--surface); }

  .btn-primary {
    flex: 2;
    background: var(--accent);
    border: none;
    border-radius: var(--radius-sm);
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 12px;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .btn-primary:active { opacity: 0.85; }

  /* Toast */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-8px);
    background: var(--surface2);
    color: var(--text);
    border: 0.5px solid var(--border2);
    border-radius: 99px;
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s, transform 0.25s;
    white-space: nowrap;
    z-index: 999;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="logo">
        <div class="logo-icon">🍽</div>
        <span class="logo-name">Beställningslista</span>
      </div>
      <span class="date-badge" id="dateLabel"></span>
    </div>
    <p class="subtitle">Lägg till vad restaurangen behöver beställa</p>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-num accent" id="statTotal">0</div>
      <div class="stat-label">Totalt</div>
    </div>
    <div class="stat">
      <div class="stat-num amber" id="statPending">0</div>
      <div class="stat-label">Saknas</div>
    </div>
    <div class="stat">
      <div class="stat-num green" id="statDone">0</div>
      <div class="stat-label">Beställt</div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-box">
      <label>Ny vara</label>
      <div class="input-row">
        <input type="text" id="itemName" placeholder="T.ex. mjöl, tomater..." autocomplete="off" />
        <input type="text" id="itemQty" placeholder="Mängd" autocomplete="off" />
        <button class="add-btn" onclick="addItem()">+ Lägg till</button>
      </div>
    </div>
  </div>

  <div class="section-label">
    <span>Varor att beställa</span>
    <span class="clear-link" onclick="clearDone()">Rensa beställda</span>
  </div>

  <div class="list" id="itemList"></div>
</div>

<div class="bottom-bar">
  <button class="btn-secondary" onclick="clearAll()">Rensa allt</button>
  <button class="btn-primary" onclick="exportList()">Kopiera lista för beställning</button>
</div>

<div class="toast" id="toast"></div>

<script>
  let items = JSON.parse(localStorage.getItem('bestallning') || '[]');
  let idCounter = items.length ? Math.max(...items.map(i => i.id)) + 1 : 1;

  const dateLabel = document.getElementById('dateLabel');
  const now = new Date();
  const days = ['Sön','Mån','Tis','Ons','Tor','Fre','Lör'];
  const months = ['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'];
  dateLabel.textContent = days[now.getDay()] + ' ' + now.getDate() + ' ' + months[now.getMonth()];

  document.getElementById('itemName').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('itemQty').focus();
  });
  document.getElementById('itemQty').addEventListener('keydown', e => {
    if (e.key === 'Enter') addItem();
  });

  function save() {
    localStorage.setItem('bestallning', JSON.stringify(items));
  }

  function addItem() {
    const nameEl = document.getElementById('itemName');
    const qtyEl = document.getElementById('itemQty');
    const name = nameEl.value.trim();
    const qty = qtyEl.value.trim();
    if (!name) { nameEl.focus(); return; }
    items.unshift({ id: idCounter++, name, qty, done: false });
    nameEl.value = '';
    qtyEl.value = '';
    nameEl.focus();
    save();
    render();
  }

  function toggleDone(id) {
    const item = items.find(i => i.id === id);
    if (item) item.done = !item.done;
    save();
    render();
  }

  function deleteItem(id) {
    items = items.filter(i => i.id !== id);
    save();
    render();
  }

  function clearDone() {
    const count = items.filter(i => i.done).length;
    if (!count) { showToast('Inga beställda varor att rensa'); return; }
    items = items.filter(i => !i.done);
    save();
    render();
    showToast(count + ' beställda varor borttagna');
  }

  function clearAll() {
    if (!items.length) return;
    if (!confirm('Rensa hela listan?')) return;
    items = [];
    save();
    render();
    showToast('Listan rensad');
  }

  function exportList() {
    const pending = items.filter(i => !i.done);
    if (!pending.length) { showToast('Inga varor att beställa'); return; }
    const dateStr = now.toLocaleDateString('sv-SE');
    const lines = pending.map(i => '• ' + i.name + (i.qty ? '  —  ' + i.qty : ''));
    const text = 'Beställningslista ' + dateStr + '\n\n' + lines.join('\n');
    if (navigator.share) {
      navigator.share({ title: 'Beställningslista', text });
    } else if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(() => showToast('Lista kopierad!'));
    } else {
      showToast('Kopiera manuellt');
    }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function render() {
    const list = document.getElementById('itemList');
    const total = items.length;
    const done = items.filter(i => i.done).length;
    const pending = total - done;

    document.getElementById('statTotal').textContent = total;
    document.getElementById('statPending').textContent = pending;
    document.getElementById('statDone').textContent = done;

    if (!items.length) {
      list.innerHTML = '<div class="empty"><div class="empty-icon">📋</div>Listan är tom.<br>Lägg till det som behöver beställas.</div>';
      return;
    }

    list.innerHTML = items.map(item => `
      <div class="item ${item.done ? 'done' : ''}">
        <div class="check-circle" onclick="toggleDone(${item.id})">✓</div>
        <div class="item-body">
          <div class="item-name">${escHtml(item.name)}</div>
          ${item.qty ? '<div class="item-qty">' + escHtml(item.qty) + '</div>' : ''}
        </div>
        <button class="del-btn" onclick="deleteItem(${item.id})" title="Ta bort">×</button>
      </div>
    `).join('');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  render();
</script>
</body>
</html>
