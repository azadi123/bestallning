<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a1a">
<title>Orelids Bestallningslista</title>
<link rel="apple-touch-icon" href="icon.png">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);--text:#f0f0f0;--muted:#888;--accent:#c8a96e;--green:#4ade80;--green-soft:rgba(74,222,128,.1);--amber:#fbbf24;--red:#f87171;--radius:14px;--radius-sm:9px}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:15px;-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}
.app{flex:1;max-width:480px;margin:0 auto;width:100%;padding:0 0 6rem}
.header{padding:2.5rem 1.25rem 1.25rem;text-align:center;border-bottom:.5px solid var(--border2);margin-bottom:1rem}
.logo-img{height:56px;width:auto;filter:invert(1);margin:0 auto 6px;display:block}
.header-sub{font-size:11px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:4px;vertical-align:middle}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 1.25rem 1rem}
.stat{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius-sm);padding:.75rem;text-align:center}
.stat-num{font-size:22px;font-weight:600;line-height:1;margin-bottom:3px}
.stat-label{font-size:11px;color:var(--muted)}
.gold{color:var(--accent)}.green{color:var(--green)}.amber{color:var(--amber)}
.input-area{padding:0 1.25rem 1rem}
.input-box{background:var(--surface);border:.5px solid var(--border2);border-radius:var(--radius);padding:1rem}
.input-box label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:10px}
.input-row{display:flex;gap:8px}
input[type=text]{background:var(--surface2);border:.5px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-size:15px;padding:10px 12px;outline:none;transition:border-color .15s;-webkit-appearance:none}
input[type=text]:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(200,169,110,.15)}
input[type=text]::placeholder{color:var(--muted)}
#itemName{flex:2}#itemQty{flex:1;min-width:0}
.add-btn{background:var(--accent);color:#1a1a1a;border:none;border-radius:var(--radius-sm);padding:10px 14px;font-size:15px;font-weight:700;cursor:pointer;flex-shrink:0}
.add-btn:active{opacity:.8}
.section-label{padding:0 1.25rem .5rem;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:flex;justify-content:space-between;align-items:center}
.clear-link{color:var(--red);font-size:11px;cursor:pointer;opacity:.7}
.list{padding:0 1.25rem;display:flex;flex-direction:column;gap:6px}
.empty,.loading{text-align:center;padding:2rem 1.25rem;color:var(--muted);font-size:14px}
.item{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);padding:.875rem 1rem;display:flex;align-items:center;gap:12px;animation:slideIn .2s ease;transition:background .2s,border-color .2s}
@keyframes slideIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.item.done{background:var(--green-soft);border-color:rgba(74,222,128,.18)}
.check-circle{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;color:transparent;font-size:13px}
.item.done .check-circle{background:var(--green);border-color:var(--green);color:#0f0f0f}
.item-body{flex:1;min-width:0}
.item-name{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .2s}
.item.done .item-name{color:var(--muted);text-decoration:line-through}
.item-qty{font-size:12px;color:var(--accent);margin-top:2px}
.item.done .item-qty{color:var(--muted)}
.del-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;padding:4px;line-height:1;transition:color .15s}
.del-btn:hover{color:var(--red)}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(15,15,15,.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:.5px solid var(--border2);padding:.875rem 1.25rem;padding-bottom:calc(.875rem + env(safe-area-inset-bottom));display:flex;gap:10px;max-width:480px;margin:0 auto}
.btn-secondary{flex:1;background:var(--surface2);border:.5px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-size:14px;font-weight:500;padding:12px;cursor:pointer}
.btn-primary{flex:2;background:var(--accent);border:none;border-radius:var(--radius-sm);color:#1a1a1a;font-size:14px;font-weight:700;padding:12px;cursor:pointer}
.btn-primary:active,.btn-secondary:active{opacity:.85}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-8px);background:var(--surface2);color:var(--text);border:.5px solid var(--border2);border-radius:99px;padding:10px 20px;font-size:13px;font-weight:500;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;white-space:nowrap;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

    <div class="header-sub"><span class="dot"></span>Live &middot; Bestallningslista</div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-num gold" id="statTotal">0</div><div class="stat-label">Totalt</div></div>
    <div class="stat"><div class="stat-num amber" id="statPending">0</div><div class="stat-label">Saknas</div></div>
    <div class="stat"><div class="stat-num green" id="statDone">0</div><div class="stat-label">Bestalt</div></div>
  </div>
  <div class="input-area">
    <div class="input-box">
      <label>Ny vara</label>
      <div class="input-row">
        <input type="text" id="itemName" placeholder="T.ex. mjol, tomater..." autocomplete="off" />
        <input type="text" id="itemQty" placeholder="Mangd" autocomplete="off" />
        <button class="add-btn" onclick="addItem()">+</button>
      </div>
    </div>
  </div>
  <div class="section-label">
    <span>Varor att bestalla</span>
    <span class="clear-link" onclick="clearDone()">Rensa bestallda</span>
  </div>
  <div class="list" id="itemList"><div class="loading">Laddar...</div></div>
</div>
<div class="bottom-bar">
  <button class="btn-secondary" onclick="clearAll()">Rensa allt</button>
  <button class="btn-primary" onclick="exportList()">Kopiera lista</button>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy, getDocs, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const cfg = {
  apiKey: "AIzaSyBeUM3EqViLk0W8QYTFrqlA1hHXkOdStxE",
  authDomain: "orelids-bc135.firebaseapp.com",
  projectId: "orelids-bc135",
  storageBucket: "orelids-bc135.firebasestorage.app",
  messagingSenderId: "34417492560",
  appId: "1:34417492560:web:dbffb9373867e9c6978755"
};

const app = initializeApp(cfg);
const db = getFirestore(app);
const col = collection(db, "bestallning");

onSnapshot(query(col, orderBy("createdAt","desc")), snap => {
  const items = [];
  snap.forEach(d => items.push({id: d.id, ...d.data()}));
  render(items);
});

window.addItem = async () => {
  const n = document.getElementById("itemName");
  const q = document.getElementById("itemQty");
  const name = n.value.trim(), qty = q.value.trim();
  if (!name) { n.focus(); return; }
  await addDoc(col, {name, qty, done: false, createdAt: Date.now()});
  n.value = ""; q.value = ""; n.focus();
};

window.toggleDone = async (id, cur) => {
  await updateDoc(doc(db,"bestallning",id), {done: !cur});
};

window.deleteItem = async id => {
  await deleteDoc(doc(db,"bestallning",id));
};

window.clearDone = async () => {
  const snap = await getDocs(query(col, where("done","==",true)));
  await Promise.all(snap.docs.map(d => deleteDoc(doc(db,"bestallning",d.id))));
  toast(snap.size + " varor borttagna");
};

window.clearAll = async () => {
  if (!confirm("Rensa hela listan?")) return;
  const snap = await getDocs(col);
  await Promise.all(snap.docs.map(d => deleteDoc(doc(db,"bestallning",d.id))));
  toast("Listan rensad");
};

window.exportList = () => {
  const rows = [...document.querySelectorAll(".item:not(.done)")];
  if (!rows.length) { toast("Inga varor att bestalla"); return; }
  const lines = rows.map(el => {
    const name = el.querySelector(".item-name").textContent;
    const qty = el.querySelector(".item-qty") ? el.querySelector(".item-qty").textContent : "";
    return "- " + name + (qty ? " (" + qty + ")" : "");
  });
  const text = "Orelids Bestallningslista " + new Date().toLocaleDateString("sv-SE") + "\n\n" + lines.join("\n");
  if (navigator.share) navigator.share({title:"Bestallningslista", text});
  else if (navigator.clipboard) navigator.clipboard.writeText(text).then(() => toast("Lista kopierad!"));
};

function render(items) {
  const done = items.filter(i => i.done).length;
  document.getElementById("statTotal").textContent = items.length;
  document.getElementById("statPending").textContent = items.length - done;
  document.getElementById("statDone").textContent = done;
  const list = document.getElementById("itemList");
  if (!items.length) { list.innerHTML = '<div class="empty">Listan ar tom.<br>Lagg till det som behovs.</div>'; return; }
  list.innerHTML = items.map(it =>
    '<div class="item' + (it.done?' done':'') + '">' +
    '<div class="check-circle" onclick="toggleDone(\''+it.id+'\','+it.done+')">&#10003;</div>' +
    '<div class="item-body"><div class="item-name">' + esc(it.name) + '</div>' +
    (it.qty ? '<div class="item-qty">' + esc(it.qty) + '</div>' : '') +
    '</div><button class="del-btn" onclick="deleteItem(\''+it.id+'\')">&#215;</button></div>'
  ).join("");
}

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}
window.showToast = toast;

document.getElementById("itemName").addEventListener("keydown", e => { if(e.key==="Enter") document.getElementById("itemQty").focus(); });
document.getElementById("itemQty").addEventListener("keydown", e => { if(e.key==="Enter") window.addItem(); });
</script>
</body>
